<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hybrid Training Tracker</title>
    <link rel="manifest" href="./manifest.json">
    <meta id="theme-color-meta" name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hybrid Plan">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <script>
        // Set theme before first paint to avoid a flash. Reads saved preference,
        // falls back to system preference. Updates browser chrome theme-color too.
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var sysDark = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = saved || (sysDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
                var meta = document.getElementById('theme-color-meta');
                if (meta) meta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#0f172a');
            } catch (e) {
                document.documentElement.dataset.theme = 'dark';
            }
        })();
    </script>

    <style>
        :root {
            --radius: 14px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #273449;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --accent-2: #3b82f6;
            --danger: #ef4444;
            --warn: #f59e0b;
            --border: #334155;
            --shadow: 0 4px 14px rgba(0, 0, 0, .35);
            --on-accent: #052e1a;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #059669;
            --accent-2: #2563eb;
            --danger: #dc2626;
            --warn: #d97706;
            --border: #e2e8f0;
            --shadow: 0 4px 14px rgba(15, 23, 42, .08);
            --on-accent: #ffffff;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 16px 140px;
        }

        header {
            padding: 12px 0 8px;
        }

        .day-tabs {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            position: sticky;
            top: 0;
            z-index: 5;
            padding: 8px 0;
            margin: 0 -16px 12px;
            padding-left: 16px;
            padding-right: 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .day-tab {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 10px;
            padding: 8px 0 6px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            position: relative;
            transition: background .15s, border-color .15s, color .15s, transform .08s;
        }
        .day-tab:active { transform: scale(.96); }
        .day-tab .abbr { display: block; font-size: 12px; }
        .day-tab .pct {
            display: block;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .day-tab.is-today::before {
            content: "";
            position: absolute;
            top: 4px;
            right: 6px;
            width: 6px;
            height: 6px;
            background: var(--accent-2);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent-2);
        }
        .day-tab.is-done {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--on-accent);
        }
        .day-tab.is-done .pct { color: var(--on-accent); opacity: .85; }
        .day-tab.is-active {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 1px var(--accent-2);
            color: var(--text);
        }
        .day-tab.is-active.is-done { color: var(--on-accent); }

        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: .3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 .dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        h1 .logo {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow:
                0 0 0 1px var(--border),
                0 6px 16px rgba(16, 185, 129, .22);
            background: var(--surface);
        }
        [data-theme="light"] h1 .logo {
            box-shadow:
                0 0 0 1px var(--border),
                0 4px 12px rgba(15, 23, 42, .12);
        }

        h1 .spacer { flex: 1; }

        .icon-btn {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            padding: 0;
            transition: background .15s;
        }
        .icon-btn:active { background: var(--surface-2); }
        .icon-btn svg { width: 18px; height: 18px; }
        [data-theme="light"] .icon-btn .icon-moon { display: inline; }
        [data-theme="light"] .icon-btn .icon-sun  { display: none; }
        [data-theme="dark"]  .icon-btn .icon-moon { display: none; }
        [data-theme="dark"]  .icon-btn .icon-sun  { display: inline; }

        .streak {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }

        .streak .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .streak .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .streak .sub {
            font-size: 12px;
            color: var(--text-dim);
        }

        .streak.is-zero .value { color: var(--text-dim); }

        .progress {
            margin: 10px 0 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .progress .label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .progress .count {
            font-size: 22px;
            font-weight: 700;
        }

        .progress .bar {
            flex: 1;
            height: 6px;
            margin: 0 14px;
            background: var(--surface-2);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress .bar > div {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width .3s ease;
        }

        .day {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin: 12px 0;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .day.is-today {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), var(--shadow);
        }

        .day.is-done .day-header .title { text-decoration: line-through; opacity: .7; }
        .day.is-done .day-header .badge { background: var(--accent); color: var(--on-accent); }

        .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            gap: 12px;
        }

        .day-header .meta { flex: 1; min-width: 0; }
        .day-header .day-of-week {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .day-header .title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 2px;
        }
        .day-header .badge {
            font-size: 11px;
            font-weight: 700;
            background: var(--surface-2);
            color: var(--text-dim);
            padding: 4px 8px;
            border-radius: 99px;
            white-space: nowrap;
        }
        .day-body {
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
        }

        /* Day swipe / drag */
        .day {
            touch-action: pan-y;
            will-change: transform, opacity;
            transform-origin: center 60%;
        }
        .day.is-entering-from-right {
            animation: enterFromRight .26s cubic-bezier(.22, .61, .36, 1);
        }
        .day.is-entering-from-left {
            animation: enterFromLeft .26s cubic-bezier(.22, .61, .36, 1);
        }
        @keyframes enterFromRight {
            from { transform: translateX(110%) rotate(6deg); opacity: 0; }
            to   { transform: translateX(0)    rotate(0);    opacity: 1; }
        }
        @keyframes enterFromLeft {
            from { transform: translateX(-110%) rotate(-6deg); opacity: 0; }
            to   { transform: translateX(0)     rotate(0);     opacity: 1; }
        }

        .ex {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .ex:last-child { border-bottom: 0; }

        .ex-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .ex-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .ex-name span { overflow: hidden; text-overflow: ellipsis; }
        .ex-target { color: var(--text-dim); font-size: 13px; white-space: nowrap; }

        .ex-play {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 0;
            transition: background .15s, color .15s, transform .08s;
        }
        .ex-play:active { transform: scale(.92); }
        .ex-play:hover { color: var(--text); background: var(--surface); }
        .ex-play svg { width: 11px; height: 11px; }

        /* Tutorial modal */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 20;
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            align-items: center;
            justify-content: center;
        }
        .modal.is-open { display: flex; }
        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(2px);
        }
        .modal-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 720px;
            width: 100%;
            padding: 14px;
            box-shadow: var(--shadow);
            max-height: calc(100vh - 32px);
            overflow: auto;
        }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; }
        .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            padding: 16px;
            line-height: 1.5;
        }

        .modal a.btn { display: block; text-align: center; text-decoration: none; }

        .sets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .set-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            transition: background .15s, border-color .15s;
        }
        .set-row.done {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--on-accent);
        }
        .set-row .set-label {
            min-width: 56px;
            font-size: 13px;
        }
        .set-row .weight {
            background: transparent;
            border: none;
            border-bottom: 1px dashed currentColor;
            color: inherit;
            font: inherit;
            font-size: 14px;
            width: 64px;
            text-align: right;
            padding: 2px 4px;
            outline: none;
            opacity: .9;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .set-row .weight::-webkit-outer-spin-button,
        .set-row .weight::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .set-row .weight::placeholder { color: currentColor; opacity: .45; }
        .set-row .weight:focus { border-bottom-style: solid; opacity: 1; }
        .set-row .unit {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: .7;
            min-width: 18px;
        }
        .set-row .toggle {
            margin-left: auto;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform .08s, background .15s, color .15s, border-color .15s;
        }
        .set-row .toggle:active { transform: scale(.92); }
        .set-row .toggle svg { width: 16px; height: 16px; }
        .set-row.done .toggle {
            background: #ffffff;
            border-color: #ffffff;
            color: var(--accent);
        }
        [data-theme="light"] .set-row.done .toggle {
            background: var(--bg);
            border-color: var(--bg);
        }

        .unit-chip {
            width: auto;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .5px;
        }

        .ex-note {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        button.btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        button.btn.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
        button.btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }

        /* Rest timer */
        .timer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(110%);
            transition: transform .25s ease;
            z-index: 10;
            box-shadow: 0 -8px 24px rgba(0, 0, 0, .35);
        }
        .timer.is-active { transform: translateY(0); }

        .timer .time {
            font-size: 30px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 100px;
            text-align: center;
        }
        .timer.is-warn .time { color: var(--warn); }
        .timer.is-done .time { color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .55; }
        }

        .timer .meta {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .timer .meta .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .timer .meta .for {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .timer .ctrls {
            display: flex;
            gap: 6px;
        }
        .timer .ctrls button {
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            border-radius: 10px;
            cursor: pointer;
        }
        .timer .ctrls button.stop { color: var(--danger); border-color: var(--danger); }

        @media (max-width: 380px) {
            .day-header .title { font-size: 15px; }
            .timer .time { font-size: 26px; min-width: 84px; }
        }
    </style>
</head>

<body>

    <header>
        <h1>
            <img class="logo" src="./icons/icon-192.png" alt="" width="30" height="30">
            Hybrid Plan
            <span class="spacer"></span>
            <button id="unit-toggle" class="icon-btn unit-chip" type="button" aria-label="Toggle weight unit">
                <span id="unit-label">kg</span>
            </button>
            <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
                </svg>
            </button>
        </h1>

        <div class="progress" aria-label="Weekly progress">
            <span class="label">Week</span>
            <div class="bar"><div id="bar-fill" style="width:0%"></div></div>
            <span class="count" id="count">0/7</span>
        </div>

        <div class="streak is-zero" id="streak-card" aria-label="Week streak">
            <div>
                <div class="label">Streak</div>
                <span class="value" id="streak-value">0</span>
                <span class="sub" id="streak-sub">weeks</span>
            </div>
            <div style="text-align:right">
                <div class="label">Best</div>
                <span class="sub" id="streak-best">0</span>
            </div>
        </div>
    </header>

    <nav class="day-tabs" id="day-tabs" aria-label="Days of week"></nav>

    <main id="day-view"></main>

    <div class="actions">
        <button class="btn" id="goto-today">Today</button>
        <button class="btn danger" onclick="resetWeek()">Reset Week</button>
    </div>

    <div class="modal" id="video-modal" role="dialog" aria-modal="true" aria-labelledby="video-title">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-card">
            <div class="modal-head">
                <h2 id="video-title">Tutorial</h2>
                <button class="modal-close" type="button" data-close aria-label="Close">×</button>
            </div>
            <div class="video-wrap" id="video-wrap">
                <iframe id="video-frame"
                        title="Exercise tutorial"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen></iframe>
            </div>
            <a id="video-fallback" class="btn primary" target="_blank" rel="noopener noreferrer">Search on YouTube</a>
        </div>
    </div>

    <div class="timer" id="timer" role="status" aria-live="polite">
        <div class="time" id="timer-time">0:00</div>
        <div class="meta">
            <span class="label">Rest</span>
            <span class="for" id="timer-for">—</span>
        </div>
        <div class="ctrls">
            <button id="timer-add">+15s</button>
            <button id="timer-toggle">Pause</button>
            <button id="timer-stop" class="stop">Stop</button>
        </div>
    </div>

    <script>
        // --- Plan data ---------------------------------------------------------
        const PLAN = [
            {
                id: "mon", dow: "Monday", title: "Upper — Chest Priority", type: "lift",
                exercises: [
                    { name: "Barbell Bench Press", sets: 4, reps: "5–8", rest: 180 },
                    { name: "Incline Dumbbell Press", sets: 3, reps: "8–12", rest: 120 },
                    { name: "Chest Dips (or machine press)", sets: 3, reps: "8–12", rest: 120 },
                    { name: "Lat Pulldown (wide grip)", sets: 4, reps: "8–12", rest: 120 },
                    { name: "Seated Cable Row", sets: 3, reps: "10–12", rest: 90 },
                    { name: "Lateral Raise", sets: 3, reps: "12–15", rest: 60 },
                    { name: "Triceps Pushdown", sets: 3, reps: "10–15", rest: 60 }
                ]
            },
            {
                id: "tue", dow: "Tuesday", title: "Easy Run", type: "run",
                exercises: [

        const DOW_INDEX = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };

        // --- Storage helpers ---------------------------------------------------
        function getWeekKey() {
            const d = new Date();
            const firstDay = new Date(d.getFullYear(), 0, 1);
            const week = Math.ceil((((d - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
            return `${d.getFullYear()}-W${week}`;
        }

        function autoReset() {
            const currentWeek = getWeekKey();
            const savedWeek = localStorage.getItem('week');
            if (savedWeek !== currentWeek) {
                Object.keys(localStorage)
                    .filter(k => k.startsWith('set:') || k.startsWith('open:') || k === 'week')
                    .forEach(k => localStorage.removeItem(k));
                localStorage.setItem('week', currentWeek);
            }
        }

        function setKey(dayId, exIdx, setIdx) { return `set:${dayId}:${exIdx}:${setIdx}`; }
        function isSetDone(dayId, exIdx, setIdx) {
            return localStorage.getItem(setKey(dayId, exIdx, setIdx)) === '1';
        }
        function saveSet(dayId, exIdx, setIdx, done) {
            if (done) localStorage.setItem(setKey(dayId, exIdx, setIdx), '1');
            else localStorage.removeItem(setKey(dayId, exIdx, setIdx));
        }

        // Weight per set. Stored under "weight:" so the weekly reset filter
        // (which only clears "set:" / "open:") leaves them untouched. That way
        // last week's numbers stay as your starting point for progressive
        // overload.
        function weightKey(dayId, exIdx, setIdx) { return `weight:${dayId}:${exIdx}:${setIdx}`; }
        function getWeight(dayId, exIdx, setIdx) {
            return localStorage.getItem(weightKey(dayId, exIdx, setIdx)) || '';
        }
        function saveWeight(dayId, exIdx, setIdx, val) {
            const v = String(val ?? '').trim();
            if (v === '') localStorage.removeItem(weightKey(dayId, exIdx, setIdx));
            else localStorage.setItem(weightKey(dayId, exIdx, setIdx), v);
        }

        function currentUnit() {
            const u = localStorage.getItem('unit');
            return u === 'lb' ? 'lb' : 'kg';
        }
        function setUnit(u) {
            localStorage.setItem('unit', u === 'lb' ? 'lb' : 'kg');
            document.getElementById('unit-label').textContent = currentUnit();
            renderDayView();
        }
        function isDayDone(day) {
            return day.exercises.every((ex, i) => {
                for (let s = 0; s < ex.sets; s++) {
                    if (!isSetDone(day.id, i, s)) return false;
                }
                return true;
            });
        }

        // --- Streak ------------------------------------------------------------
        // streak: current consecutive-weeks-completed count.
        // best:   highest streak ever reached.
        // streakWeek: the week key (YYYY-Wn) we last counted toward streak.
        function getStreak() {
            return {
                streak: parseInt(localStorage.getItem('streak') || '0', 10),
                best: parseInt(localStorage.getItem('streakBest') || '0', 10),
                week: localStorage.getItem('streakWeek') || ''
            };
        }
        function saveStreak(s) {
            localStorage.setItem('streak', String(s.streak));
            localStorage.setItem('streakBest', String(s.best));
            if (s.week) localStorage.setItem('streakWeek', s.week);
            else localStorage.removeItem('streakWeek');
        }
        function previousWeekKey() {
            const d = new Date();
            d.setDate(d.getDate() - 7);
            const firstDay = new Date(d.getFullYear(), 0, 1);
            const week = Math.ceil((((d - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
            return `${d.getFullYear()}-W${week}`;
        }

        // Re-evaluate the streak when the current week's done-count changes.
        // Call this whenever a set is toggled.
        function refreshStreak() {
            const allDone = PLAN.every(d => isDayDone(d));
            const currentWeek = getWeekKey();
            const s = getStreak();

            if (allDone && s.week !== currentWeek) {
                // Just completed this week. Did it follow last week?
                s.streak = (s.week === previousWeekKey()) ? s.streak + 1 : 1;
                s.week = currentWeek;
                if (s.streak > s.best) s.best = s.streak;
                saveStreak(s);
            } else if (!allDone && s.week === currentWeek) {
                // Un-completed within the same week — back the count out.
                s.streak = Math.max(0, s.streak - 1);
                s.week = '';
                saveStreak(s);
            }
            renderStreak();
        }

        function renderStreak() {
            const s = getStreak();
            const card = document.getElementById('streak-card');
            const valEl = document.getElementById('streak-value');
            const subEl = document.getElementById('streak-sub');
            const bestEl = document.getElementById('streak-best');
            valEl.textContent = s.streak;
            subEl.textContent = s.streak === 1 ? 'week' : 'weeks';
            bestEl.textContent = s.best;
            card.classList.toggle('is-zero', s.streak === 0);
        }

        // --- Render ------------------------------------------------------------
        const tabsEl = document.getElementById('day-tabs');
        const dayViewEl = document.getElementById('day-view');
        const todayId = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];

        let currentDayId = (() => {
            const saved = localStorage.getItem('view');
            return PLAN.some(d => d.id === saved) ? saved : todayId;
        })();

        function dayCounts(day) {
            const total = day.exercises.reduce((n, e) => n + e.sets, 0);
            const done = day.exercises.reduce((n, ex, i) => {
                let c = 0;
                for (let s = 0; s < ex.sets; s++) if (isSetDone(day.id, i, s)) c++;
                return n + c;
            }, 0);
            return { total, done };
        }

        function renderTabs() {
            tabsEl.innerHTML = PLAN.map(day => {
                const { done, total } = dayCounts(day);
                const isAllDone = total > 0 && done === total;
                const isActive = day.id === currentDayId;
                const isToday = day.id === todayId;
                const abbr = day.dow.slice(0, 3);
                const cls = [
                    'day-tab',
                    isActive ? 'is-active' : '',
                    isAllDone ? 'is-done' : '',
                    isToday ? 'is-today' : ''
                ].filter(Boolean).join(' ');
                return `
                    <button class="${cls}" data-day="${day.id}" aria-pressed="${isActive}">
                        <span class="abbr">${abbr}</span>
                        <span class="pct">${done}/${total}</span>
                    </button>
                `;
            }).join('');
        }

        function renderDayView() {
            const day = PLAN.find(d => d.id === currentDayId);
            if (!day) return;
            const { done: doneSets, total: totalSets } = dayCounts(day);
            const isAllDone = totalSets > 0 && doneSets === totalSets;
            const isToday = day.id === todayId;

            dayViewEl.innerHTML = `
                <section class="day ${isAllDone ? 'is-done' : ''} ${isToday ? 'is-today' : ''}" data-id="${day.id}">
                    <div class="day-header">
                        <div class="meta">
                            <div class="day-of-week">${day.dow}${isToday ? ' · Today' : ''}</div>
                            <div class="title">${day.title}</div>
                        </div>
                        <span class="badge">${doneSets}/${totalSets}</span>
                    </div>
                    <div class="day-body">
                        ${day.exercises.map((ex, i) => `
                            <div class="ex">
                                <div class="ex-head">
                                    <div class="ex-name">
                                        <span>${ex.name}</span>
                                        <button class="ex-play" type="button"
                                                data-name="${ex.name.replace(/"/g, '&quot;')}"
                                                data-video="${ex.videoId || ''}"
                                                aria-label="Watch ${ex.name} tutorial"
                                                title="Watch tutorial">
                                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                                <polygon points="6,4 20,12 6,20"></polygon>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="ex-target">${ex.sets}×${ex.reps}${ex.rest ? ` · ${ex.rest}s rest` : ''}</div>
                                </div>
                                <div class="sets">
                                    ${Array.from({ length: ex.sets }).map((_, s) => {
                                        const done = isSetDone(day.id, i, s);
                                        const w = getWeight(day.id, i, s);
                                        const showWeight = day.type !== 'run';
                                        return `
                                        <div class="set-row ${done ? 'done' : ''}"
                                             data-day="${day.id}"
                                             data-ex="${i}"
                                             data-set="${s}"
                                             data-rest="${ex.rest}"
                                             data-name="${ex.name.replace(/"/g, '&quot;')}">
                                            <span class="set-label">${ex.sets === 1 ? 'Done' : `Set ${s + 1}`}</span>
                                            ${showWeight ? `
                                                <input class="weight" type="number"
                                                       inputmode="decimal" step="0.5" min="0"
                                                       placeholder="—"
                                                       value="${w}"
                                                       aria-label="Weight in ${currentUnit()}">
                                                <span class="unit">${currentUnit()}</span>
                                            ` : ''}
                                            <button class="toggle" type="button" aria-label="${done ? 'Mark not done' : 'Mark done'}">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                                    <polyline points="20 6 9 17 4 12"></polyline>
                                                </svg>
                                            </button>
                                        </div>`;
                                    }).join('')}
                                </div>
                                ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
                            </div>
                        `).join('')}
                        ${day.note ? `<div class="ex-note" style="padding-top:12px">${day.note}</div>` : ''}
                    </div>
                </section>
            `;

            if (pendingEnter) {
                const card = dayViewEl.querySelector('.day');
                if (card) card.classList.add(`is-entering-from-${pendingEnter}`);
                pendingEnter = null;
            }
        }

        function setDay(id) {
            if (!PLAN.some(d => d.id === id)) return;
            currentDayId = id;
            localStorage.setItem('view', id);
            renderTabs();
            renderDayView();
        }

        function render() {
            renderTabs();
            renderDayView();
            updateProgress();
        }

        function updateProgress() {
            const doneCount = PLAN.filter(d => isDayDone(d)).length;
            document.getElementById('count').textContent = `${doneCount}/7`;
            document.getElementById('bar-fill').style.width = `${(doneCount / 7) * 100}%`;
        }

        // --- Interactions ------------------------------------------------------
        tabsEl.addEventListener('click', e => {
            const btn = e.target.closest('.day-tab');
            if (btn) setDay(btn.dataset.day);
        });

        dayViewEl.addEventListener('click', e => {
            const playBtn = e.target.closest('.ex-play');
            if (playBtn) {
                e.stopPropagation();
                openTutorial(playBtn.dataset.name, playBtn.dataset.video);
                return;
            }

            // Don't toggle when interacting with the weight input.
            if (e.target.closest('.weight')) return;

            const row = e.target.closest('.set-row');
            if (!row) return;

            const { day, ex, set, rest, name } = row.dataset;
            const wasDone = row.classList.contains('done');
            const nowDone = !wasDone;
            row.classList.toggle('done', nowDone);
            saveSet(day, +ex, +set, nowDone);

            const card = dayViewEl.querySelector(`.day[data-id="${day}"]`);
            const all = card.querySelectorAll('.set-row');
            const doneN = card.querySelectorAll('.set-row.done').length;
            card.querySelector('.badge').textContent = `${doneN}/${all.length}`;
            card.classList.toggle('is-done', doneN === all.length);
            updateProgress();
            refreshStreak();
            renderTabs();

            if (nowDone && +rest > 0) startTimer(+rest, name, +set + 1);
        });

        // Persist weight as the user types. Use 'input' so we don't lose data
        // if they navigate away without blurring the field.
        dayViewEl.addEventListener('input', e => {
            const inp = e.target.closest('.weight');
            if (!inp) return;
            const row = inp.closest('.set-row');
            if (!row) return;
            saveWeight(row.dataset.day, +row.dataset.ex, +row.dataset.set, inp.value);
        });

        // --- Tinder-style drag-to-switch ---------------------------------------
        // Drag follows the finger 1:1, with a slight rotation tied to distance.
        // Release past the threshold flies the card off-screen and slides the
        // next/prev card in; release short-of snaps back to center.
        const SWIPE_THRESHOLD = 80;        // px before commit
        const VELOCITY_THRESHOLD = 0.5;    // px/ms; flick commits even if short
        const FLY_OUT_MS = 220;
        let drag = null;
        let isAnimating = false;
        let pendingEnter = null; // 'left' | 'right' | null

        function activeCard() { return dayViewEl.querySelector('.day'); }

        function resetCard(card) {
            card.style.transition = '';
            card.style.transform = '';
            card.style.opacity = '';
        }

        function snapBack(card) {
            card.style.transition = 'transform .22s ease, opacity .22s ease';
            card.style.transform = '';
            card.style.opacity = '';
            setTimeout(() => { if (card) card.style.transition = ''; }, 240);
        }

        function commitSwipe(direction) {
            // direction +1 = next day (card flies left), -1 = prev (card flies right)
            const card = activeCard();
            if (!card) return;
            const idx = PLAN.findIndex(d => d.id === currentDayId);
            const nextIdx = idx + direction;
            if (nextIdx < 0 || nextIdx >= PLAN.length) {
                snapBack(card);
                return;
            }
            isAnimating = true;
            const offscreen = direction === 1 ? -110 : 110;
            const rotate = direction === 1 ? -8 : 8;
            card.style.transition = `transform ${FLY_OUT_MS}ms cubic-bezier(.4,.0,.2,1), opacity ${FLY_OUT_MS}ms ease`;
            card.style.transform = `translateX(${offscreen}vw) rotate(${rotate}deg)`;
            card.style.opacity = '0';
            setTimeout(() => {
                pendingEnter = direction === 1 ? 'right' : 'left';
                setDay(PLAN[nextIdx].id);
                isAnimating = false;
            }, FLY_OUT_MS);
        }

        dayViewEl.addEventListener('touchstart', e => {
            if (isAnimating) { drag = null; return; }
            if (e.touches.length !== 1) { drag = null; return; }
            // Don't start a drag from interactive controls — they have their
            // own behavior (set buttons, play buttons, links).
            if (e.target.closest('.set-row, .ex-play, a, button, input, textarea')) {
                drag = null;
                return;
            }
            const t = e.touches[0];
            drag = {
                startX: t.clientX, startY: t.clientY,
                lastX: t.clientX, lastT: Date.now(),
                deltaX: 0, deltaY: 0,
                axis: null  // 'h' | 'v' once decided
            };
        }, { passive: true });

        dayViewEl.addEventListener('touchmove', e => {
            if (!drag) return;
            const t = e.touches[0];
            drag.deltaX = t.clientX - drag.startX;
            drag.deltaY = t.clientY - drag.startY;
            drag.lastX = t.clientX;
            drag.lastT = Date.now();

            if (!drag.axis) {
                if (Math.abs(drag.deltaX) > 6 || Math.abs(drag.deltaY) > 6) {
                    drag.axis = Math.abs(drag.deltaX) > Math.abs(drag.deltaY) ? 'h' : 'v';
                }
            }
            if (drag.axis !== 'h') return;

            // We're now committed to a horizontal drag — stop the page from
            // also scrolling vertically.
            e.preventDefault();

            const card = activeCard();
            if (!card) return;
            const dx = drag.deltaX;
            const idx = PLAN.findIndex(d => d.id === currentDayId);
            // Add resistance at the edges so it feels like a rubber band.
            let visualDx = dx;
            if ((idx === 0 && dx > 0) || (idx === PLAN.length - 1 && dx < 0)) {
                visualDx = dx * 0.35;
            }
            const rotate = Math.max(-10, Math.min(10, visualDx / 18));
            const opacity = Math.max(0.55, 1 - Math.abs(visualDx) / (window.innerWidth * 0.9));
            card.style.transition = 'none';
            card.style.transform = `translateX(${visualDx}px) rotate(${rotate}deg)`;
            card.style.opacity = String(opacity);
        }, { passive: false });

        function endDrag(cancelled) {
            if (!drag) return;
            const dx = drag.deltaX;
            const dt = Math.max(1, Date.now() - drag.lastT) + 1;
            const vx = dx / Math.max(60, Date.now() - (drag.lastT - 60)); // rough velocity
            const card = activeCard();
            const wasHoriz = drag.axis === 'h';
            drag = null;
            if (!card || !wasHoriz || cancelled) {
                if (card) resetCard(card);
                return;
            }
            const flick = Math.abs(vx) > VELOCITY_THRESHOLD;
            if (dx <= -SWIPE_THRESHOLD || (flick && dx < 0)) {
                commitSwipe(1);  // next
            } else if (dx >= SWIPE_THRESHOLD || (flick && dx > 0)) {
                commitSwipe(-1); // previous
            } else {
                snapBack(card);
            }
        }

        dayViewEl.addEventListener('touchend', () => endDrag(false));
        dayViewEl.addEventListener('touchcancel', () => endDrag(true));

        // Keyboard arrows on desktop
        document.addEventListener('keydown', e => {
            if (e.target.matches('input, textarea, button')) return;
            if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
            if (modalEl.classList.contains('is-open')) return;
            const idx = PLAN.findIndex(d => d.id === currentDayId);
            const next = Math.max(0, Math.min(PLAN.length - 1, e.key === 'ArrowRight' ? idx + 1 : idx - 1));
            if (next !== idx) setDay(PLAN[next].id);
        });

        document.getElementById('goto-today').addEventListener('click', () => setDay(todayId));

        function resetWeek() {
            if (!confirm('Reset all checks for this week?')) return;
            Object.keys(localStorage)
                .filter(k => k.startsWith('set:') || k.startsWith('open:'))
                .forEach(k => localStorage.removeItem(k));
            location.reload();
        }
        window.resetWeek = resetWeek;

        // --- Tutorial modal ----------------------------------------------------
        // If videoId is set on an exercise, embed it directly via youtube-nocookie.
        // Otherwise hide the iframe and show a "Search on YouTube" link that opens
        // a search results page in a new tab.
        const modalEl = document.getElementById('video-modal');
        const videoFrame = document.getElementById('video-frame');
        const videoWrap = document.getElementById('video-wrap');
        const videoTitle = document.getElementById('video-title');
        const videoFallback = document.getElementById('video-fallback');

        function openTutorial(name, videoId) {
            videoTitle.textContent = name;
            const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(name + ' form tutorial')}`;
            videoFallback.href = searchUrl;

            if (videoId) {
                videoFrame.src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(videoId)}?rel=0&modestbranding=1`;
                videoWrap.style.display = '';
                videoFallback.textContent = 'Open on YouTube';
                videoFallback.href = `https://www.youtube.com/watch?v=${encodeURIComponent(videoId)}`;
            } else {
                videoFrame.removeAttribute('src');
                videoWrap.style.display = 'none';
                videoFallback.textContent = 'Search on YouTube';
            }
            modalEl.classList.add('is-open');
        }

        function closeTutorial() {
            videoFrame.removeAttribute('src'); // stop playback
            modalEl.classList.remove('is-open');
        }

        modalEl.addEventListener('click', e => {
            if (e.target.closest('[data-close]')) closeTutorial();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && modalEl.classList.contains('is-open')) closeTutorial();
        });

        // --- Rest timer --------------------------------------------------------
        const timerEl = document.getElementById('timer');
        const timeEl = document.getElementById('timer-time');
        const forEl = document.getElementById('timer-for');
        const toggleBtn = document.getElementById('timer-toggle');
        const stopBtn = document.getElementById('timer-stop');
        const addBtn = document.getElementById('timer-add');

        let timerState = { remaining: 0, running: false, intervalId: null, total: 0 };

        function fmt(s) {
            const m = Math.floor(s / 60);
            const r = s % 60;
            return `${m}:${r.toString().padStart(2, '0')}`;
        }

        function renderTimer() {
            timeEl.textContent = fmt(Math.max(0, timerState.remaining));
            timerEl.classList.toggle('is-warn', timerState.remaining > 0 && timerState.remaining <= 10);
            timerEl.classList.toggle('is-done', timerState.remaining <= 0);
            toggleBtn.textContent = timerState.running ? 'Pause' : 'Resume';
        }

        function startTimer(seconds, exerciseName, setNumber) {
            stopTimer(false);
            timerState.total = seconds;
            timerState.remaining = seconds;
            timerState.running = true;
            forEl.textContent = `After ${exerciseName} · Set ${setNumber}`;
            timerEl.classList.add('is-active');
            renderTimer();

            timerState.intervalId = setInterval(() => {
                if (!timerState.running) return;
                timerState.remaining -= 1;
                renderTimer();
                if (timerState.remaining <= 0) {
                    finishTimer();
                }
            }, 1000);
        }

        function finishTimer() {
            timerState.running = false;
            clearInterval(timerState.intervalId);
            timerState.intervalId = null;
            beep();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            renderTimer();
        }

        function stopTimer(hide = true) {
            timerState.running = false;
            clearInterval(timerState.intervalId);
            timerState.intervalId = null;
            timerState.remaining = 0;
            if (hide) timerEl.classList.remove('is-active');
            renderTimer();
        }

        toggleBtn.addEventListener('click', () => {
            if (timerState.remaining <= 0) return;
            timerState.running = !timerState.running;
            renderTimer();
        });
        stopBtn.addEventListener('click', () => stopTimer(true));
        addBtn.addEventListener('click', () => {
            timerState.remaining += 15;
            if (!timerState.running && timerState.remaining > 0) {
                timerState.running = true;
                if (!timerState.intervalId) {
                    timerState.intervalId = setInterval(() => {
                        if (!timerState.running) return;
                        timerState.remaining -= 1;
                        renderTimer();
                        if (timerState.remaining <= 0) finishTimer();
                    }, 1000);
                }
            }
            renderTimer();
        });

        // Web Audio API beep — no asset needed
        let audioCtx;
        function beep() {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                const beepAt = (offset, freq) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.frequency.value = freq;
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    const t = audioCtx.currentTime + offset;
                    g.gain.setValueAtTime(0.0001, t);
                    g.gain.exponentialRampToValueAtTime(0.4, t + 0.01);
                    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
                    o.start(t);
                    o.stop(t + 0.26);
                };
                beepAt(0, 880);
                beepAt(0.32, 880);
                beepAt(0.64, 1320);
            } catch (e) { /* audio not allowed yet */ }
        }

        // --- Theme toggle ------------------------------------------------------
        const themeBtn = document.getElementById('theme-toggle');
        const themeMeta = document.getElementById('theme-color-meta');
        function applyTheme(theme) {
            document.documentElement.dataset.theme = theme;
            localStorage.setItem('theme', theme);
            if (themeMeta) themeMeta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#0f172a');
        }
        themeBtn.addEventListener('click', () => {
            const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
            applyTheme(next);
        });

        // --- Unit toggle (kg / lb) --------------------------------------------
        // The unit is just a label — the number you type is stored as-is. Pick
        // one and stick with it; switching does not auto-convert existing
        // values. This keeps things simple and predictable for tracking.
        document.getElementById('unit-label').textContent = currentUnit();
        document.getElementById('unit-toggle').addEventListener('click', () => {
            setUnit(currentUnit() === 'kg' ? 'lb' : 'kg');
        });

        // --- Boot --------------------------------------------------------------
        autoReset();
        render();
        renderStreak();

        // Register service worker for offline + installable PWA.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('./sw.js')
                    .catch((err) => console.warn('SW registration failed', err));
            });
        }
    </script>

</body>
